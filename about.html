<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — PretendCLI.js Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;

<body>

  <div id="terminal-zone">
    <h1>about</h1>
    <p>このページはPretendCLI.jsのインライン・ナビゲーションデモです。</p>

    <ul>
      <li>名前: PretendCLI 開発者</li>
      <li>好きなテーマ: amber</li>
      <li>モットー: CLIのふりをすることを恐れない</li>
    </ul>

    <h2>ls navigation/</h2>
    <ul>
      <li><a href="index.html">← トップに戻る</a></li>
    </ul>
  </div>

  <script src="pretend-cli.js"></script>
  <script>
    PretendCLI.init({
      target: '#terminal-zone',
      theme: 'dark',
      navigation: 'inline',
      exitLink: true,
      exitLabel: 'exit (通常表示に戻る)',
    });
